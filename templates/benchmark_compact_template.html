<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GuideLLM Results</title>
  <style>
    .theme-dark {
      --bg: #0b0f14;
      --panel: #0f141b;
      --border: #1f2a37;
      --text: #e5e7eb;
      --muted: #9aa4b2;
      --accent: #22c55e;
    }
    .theme-light {
      --bg: #f7f7fb;
      --panel: #ffffff;
      --border: #e3e7ee;
      --text: #0b0f14;
      --muted: #4b5563;
      --accent: #0ea5e9;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", Arial, sans-serif; }
    .wrap { max-width: 980px; margin: 32px auto; padding: 0 16px; }
    .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
    .title { font-size: 20px; font-weight: 600; }
    .model { font-size: 24px; font-weight: 700; color: var(--accent); }
    .meta { color: var(--muted); font-size: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .card.subtle { opacity: 0.85; }
    .meta-title { color: var(--muted); font-weight: 600; font-size: 12px; letter-spacing: 0.02em; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-weight: 600; color: var(--muted); background: color-mix(in srgb, var(--panel) 85%, #000 15%); border-bottom: 1px solid var(--border); padding: 12px 16px; }
    tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    .value { font-weight: 600; }
  </style>
</head>
<body class="{{THEME_CLASS}}">
  <div class="wrap">
    <div class="header">
      <div>
        <div class="title">Complete Results</div>
        <div class="model">{{MODEL}}</div>
      </div>
      <div class="meta">Strategy: {{STRATEGY}}</div>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>Metric</th><th>Value</th></tr>
        </thead>
        <tbody>
          {{ROWS}}
        </tbody>
      </table>
    </div>
    <div class="card subtle" style="margin-top:16px;">
      <table>
        <thead>
          <tr><th colspan="2"><span class="meta-title">Run Metadata</span></th></tr>
        </thead>
        <tbody>
          {{META_ROWS}}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
